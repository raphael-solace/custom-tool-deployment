log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: "custom_echo_agent.log"

apps:
  - name: "custom_echo_agent"
    app_base_path: "."
    app_module: "solace_agent_mesh.agent.sac.app"
    broker:
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "custom_echo_agent"
      display_name: "Custom BBVA Agent Hello World"

      instruction: |
        You are a deterministic deployment validation agent.
        You work for BBVA in Spain for customers worldwide.
        Use simple_rag for retrieval-style questions about deployment and configuration.
        Use query_external_postgres for read-only SQL checks on the configured external PostgreSQL database.
        Use publish_event to send JSON events to Solace topics.
        Use inspect_pdf to read PDF files from allowed roots and attached chat artifacts.
        For uploaded files, pass the uploaded filename as file_path.
        If no file_path is given, inspect_pdf should use the latest attached PDF artifact.
        If artifact is attached to the orchestrator, inspect_pdf should search shared artifact context and shared artifact storage automatically.
        Prefer inspect_pdf for PDF analysis instead of generic extract_content_from_artifact.
        Keep responses short and precise.

      model:
        model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
        api_base: "${LLM_SERVICE_ENDPOINT}"
        api_key: "${LLM_SERVICE_API_KEY}"

      tools:
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "healthcheck_echo"
          tool_name: "healthcheck_echo"
          tool_config:
            prefix: "HELLO"
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "simple_rag"
          tool_name: "simple_rag"
          tool_config:
            documents:
              - "Standalone mode requires deploymentMode standalone and a dedicated sam-agent Helm release."
              - "Custom tools are loaded from custom_echo_agent.tools and declared in app_config.tools."
              - "The DATABASE_URL bridge secret is required for standalone database initialization."
              - "Verification includes rollout status, db-init logs, sam logs, and in-pod Python import checks."
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "query_external_postgres"
          tool_name: "query_external_postgres"
          tool_config:
            database_url: "__REDACTED_DATABASE_URL__"
            default_max_rows: 50
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "publish_event"
          tool_name: "publish_event"
          tool_config:
            max_payload_chars: 200000
            disable_certificate_validation: true
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "inspect_pdf"
          tool_name: "inspect_pdf"
          tool_config:
            search_shared_artifacts: true
            search_bucket_artifacts: true
            bucket_max_scan_keys: 5000
            bucket_max_candidates: 30
            allowed_roots:
              - "/tmp"
              - "/app"

      session_service:
        type: ${PERSISTENCE_TYPE, sql}
        database_url: ${DATABASE_URL}
        default_behavior: PERSISTENT

      artifact_service:
        type: ${ARTIFACT_SERVICE_TYPE, s3}
        bucket_name: ${S3_BUCKET_NAME}
        endpoint_url: ${S3_ENDPOINT_URL}
        aws_region: ${AWS_REGION, us-east-1}
        artifact_scope: namespace

      artifact_handling_mode: reference
      enable_embed_resolution: true
      enable_artifact_content_instruction: true
      extract_content_from_artifact_config:
        supported_binary_mime_types:
          - "application/pdf"
          - "application/x-pdf"

      agent_card:
        description: "BBVA agent that helps customers"
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "healthcheck_echo"
            name: "Healthcheck Echo"
            description: "Returns deterministic payload for deployment checks"
          - id: "simple_rag"
            name: "Simple RAG"
            description: "Retrieves best matching chunks from a configured local corpus"
          - id: "query_external_postgres"
            name: "External Postgres Query"
            description: "Runs read-only SQL SELECT queries against external PostgreSQL"
          - id: "publish_event"
            name: "Publish Event"
            description: "Publishes JSON payloads to Solace topics using runtime broker credentials"
          - id: "inspect_pdf"
            name: "Inspect PDF"
            description: "Extracts PDF text from local paths or chat attachments and returns query-focused excerpts"

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: false

      inter_agent_communication:
        allow_list: []
        request_timeout_seconds: 30
