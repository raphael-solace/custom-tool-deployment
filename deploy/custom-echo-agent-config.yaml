log:
  stdout_log_level: INFO
  log_file_level: INFO
  log_file: "custom_echo_agent.log"

apps:
  - name: "custom_echo_agent"
    app_base_path: "."
    app_module: "solace_agent_mesh.agent.sac.app"
    broker:
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: true
      agent_name: "custom_echo_agent"
      display_name: "Custom Echo Agent"

      instruction: |
        You are a deterministic deployment validation agent.
        Use healthcheck_echo when asked for a health check or echo response.
        Keep responses short and precise.

      model:
        model: "${LLM_SERVICE_GENERAL_MODEL_NAME}"
        api_base: "${LLM_SERVICE_ENDPOINT}"
        api_key: "${LLM_SERVICE_API_KEY}"

      tools:
        - tool_type: python
          component_module: "custom_echo_agent.tools"
          component_base_path: "."
          function_name: "healthcheck_echo"
          tool_name: "healthcheck_echo"
          tool_config:
            prefix: "HELLO"

      session_service:
        type: ${PERSISTENCE_TYPE, sql}
        database_url: ${DATABASE_URL}
        default_behavior: PERSISTENT

      artifact_service:
        type: ${ARTIFACT_SERVICE_TYPE, s3}
        bucket_name: ${S3_BUCKET_NAME}
        endpoint_url: ${S3_ENDPOINT_URL}
        aws_region: ${AWS_REGION, us-east-1}
        artifact_scope: namespace

      artifact_handling_mode: reference
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: "Deterministic custom echo agent for standalone deployment verification"
        defaultInputModes: ["text"]
        defaultOutputModes: ["text"]
        skills:
          - id: "healthcheck_echo"
            name: "Healthcheck Echo"
            description: "Returns deterministic payload for deployment checks"

      agent_card_publishing:
        interval_seconds: 10

      agent_discovery:
        enabled: false

      inter_agent_communication:
        allow_list: []
        request_timeout_seconds: 30
